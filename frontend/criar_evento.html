<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Criar Evento</title>
    <link rel="stylesheet" href="css/gestor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="gestor" data-pagina="criar-evento">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Criar Novo Evento</h2>

            <div id="msg-erro" class="msg-erro" style="display: none;"></div>

            <form action="../backend/criar_evento.php" method="POST" id="form-evento">

                <label for="nome">Nome do Evento</label>
                <input type="text" id="nome" name="nome" placeholder="Nome do evento" required>

                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" placeholder="Descrição do evento (opcional)"></textarea>

                <label for="data_evento">Data do Evento</label>
                <input type="date" id="data_evento" name="data_evento" required>

                <label for="horario_abertura">Horário de Abertura</label>
                <input type="time" id="horario_abertura" name="horario_abertura" required>

                <label for="idade_minima">Idade Mínima</label>
                <input type="number" id="idade_minima" name="idade_minima" value="18" min="0" required>

                <label for="capacidade_maxima">Capacidade Máxima</label>
                <input type="number" id="capacidade_maxima" name="capacidade_maxima" min="1" required>

                <button type="submit">Criar Evento</button>
            </form>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/criar_evento.js"></script>
</body>
</html>

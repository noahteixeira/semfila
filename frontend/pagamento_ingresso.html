<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Pagamento do Ingresso</title>
    <link rel="stylesheet" href="css/carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="baladeiro" data-pagina="eventos">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Pagamento do Ingresso</h2>
            <p>Confirme o pagamento para gerar seus ingressos.</p>

            <div id="msg-erro" class="msg-erro" style="display: none;"></div>
            <div id="msg-sucesso" class="msg-sucesso" style="display: none;"></div>

            <div id="resumo-pagamento" class="resumo-compra"></div>

            <div class="botoes-acao">
                <button id="btn-pagar" class="btn btn-principal">Confirmar Pagamento</button>
                <button id="btn-cancelar" class="btn btn-secundario">Cancelar</button>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/carrinho_manager.js"></script>
    <script src="js/pagamento_ingresso.js"></script>
</body>
</html>

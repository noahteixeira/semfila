<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Validar Entrada</title>
    <link rel="stylesheet" href="css/funcionario.css">
</head>
<body>

    <div class="container">
        <img src="assets/logo.png" alt="SemFila" class="logo">
        <h2>Controle de Entrada</h2>
        <p class="descricao">Escaneie o QR Code ou digite o código de ingresso.</p>

        <div class="validacao-container">
            <div class="campo-qr">
                <label for="qr-code">Código do Ingresso (QR Code):</label>
                <input type="text" id="qr-code" placeholder="Escaneie ou digite o código" autofocus>
                <button id="buscar-btn">Validar</button>
            </div>

            <div id="participante-info" style="display: none;" class="participante-info">
                <h3>Dados do Participante:</h3>
                <p><strong>Nome:</strong> <span id="participante-nome"></span></p>
                <p><strong>Idade:</strong> <span id="participante-idade"></span> anos</p>
                <p><strong>Evento:</strong> <span id="evento-nome"></span></p>
                <div id="foto-container" style="display: none;">
                    <p><strong>Foto:</strong></p>
                    <img id="participante-foto" src="" alt="Foto" style="max-width: 150px; border-radius: 8px;">
                </div>
                <button id="liberar-btn" class="btn-liberar">Liberar Entrada</button>
            </div>

            <div id="msg-sucesso" class="msg-sucesso" style="display: none;"></div>
            <div id="msg-erro" class="msg-erro" style="display: none;"></div>
        </div>

        <div class="menu">
            <a href="area_funcionario.html" class="btn">Voltar</a>
        </div>
    </div>

    <script src="js/validar_entrada.js"></script>
</body>
</html>

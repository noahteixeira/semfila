<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Editar Evento</title>
    <link rel="stylesheet" href="css/gestor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="gestor" data-pagina="eventos">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Editar Evento</h2>

            <div id="msg-erro" class="msg-erro" style="display: none;"></div>

            <form action="../backend/editar_evento.php" method="POST" id="form-evento">
                <input type="hidden" id="evento_id" name="evento_id">

                <label for="nome">Nome do Evento</label>
                <input type="text" id="nome" name="nome" placeholder="Nome do evento" required>

                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" placeholder="Descrição do evento (opcional)"></textarea>

                <label for="data_evento">Data do Evento</label>
                <input type="date" id="data_evento" name="data_evento" required>

                <label for="horario_abertura">Horário de Abertura</label>
                <input type="time" id="horario_abertura" name="horario_abertura" required>

                <label for="idade_minima">Idade Mínima</label>
                <input type="number" id="idade_minima" name="idade_minima" min="0" required>

                <label for="capacidade_maxima">Capacidade Máxima</label>
                <input type="number" id="capacidade_maxima" name="capacidade_maxima" min="1" required>

                <h3>Lote de Ingressos</h3>

                <label for="nome_lote">Nome do Lote</label>
                <input type="text" id="nome_lote" name="nome_lote" required>

                <label for="preco_lote">Preço do Ingresso (R$)</label>
                <input type="number" id="preco_lote" name="preco_lote" min="0.01" step="0.01" required>

                <label for="taxa_plataforma">Taxa da Plataforma (R$)</label>
                <input type="number" id="taxa_plataforma" name="taxa_plataforma" min="0" step="0.01" required>

                <label for="quantidade_lote">Quantidade de Ingressos</label>
                <input type="number" id="quantidade_lote" name="quantidade_lote" min="1" required>

                <button type="submit">Salvar Alterações</button>
            </form>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/editar_evento.js"></script>
</body>
</html>

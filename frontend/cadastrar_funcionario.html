<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Cadastrar Funcionário</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="container">
        <img src="assets/logo.png" alt="SemFila" class="logo">
        <h2>Cadastrar Novo Funcionário</h2>

        <div id="msg-erro" class="msg-erro" style="display: none;"></div>
        <div id="msg-sucesso" class="msg-sucesso" style="display: none;"></div>

        <form method="POST" id="form-funcionario">

            <label for="nome">Nome do Funcionário</label>
            <input type="text" id="nome" name="nome" placeholder="Nome completo" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="funcionario@email.com" required>

            <button type="submit">Cadastrar Funcionário</button>
        </form>

        <div class="menu">
            <a href="listar_funcionarios.html" class="btn">Ver Funcionários</a>
            <a href="area_gestor.html" class="btn">Voltar</a>
        </div>
    </div>

    <script src="js/cadastrar_funcionario.js"></script>
</body>
</html>

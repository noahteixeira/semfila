<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Perfil do Baladeiro</title>
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="baladeiro" data-pagina="perfil">

    <main class="conteudo-principal">
        <div class="container">
            <h1>Seu Perfil</h1>

            <div class="dados">
                <p><strong>Nome:</strong> <span id="nome"></span></p>
                <p><strong>E-mail:</strong> <span id="email"></span></p>
                <p><strong>CPF:</strong> <span id="cpf"></span></p>
                <p><strong>Data de Nascimento:</strong> <span id="data_nascimento"></span></p>
                <p><strong>Foto de Perfil:</strong> <img id="foto_perfil" src="" alt="Foto de Perfil" width="100" style="display: none;"></p>
                <p><strong>Documento:</strong> <a id="documento_url" href="" target="_blank" style="display: none;">Ver Documento</a></p>
                <p><strong>Cadastrado em:</strong> <span id="criado_em"></span></p>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Relatórios</title>
    <link rel="stylesheet" href="css/gestor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="gestor" data-pagina="relatorios">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Relatórios</h2>
            <p class="descricao">Resumo simples de entradas, ingressos e consumo do bar por evento.</p>

            <div class="filtro">
                <label for="evento-select">Selecione o Evento:</label>
                <select id="evento-select">
                    <option value="">Selecione um evento</option>
                </select>
                <button id="carregar-btn">Carregar Relatório</button>
            </div>

            <div id="relatorio">
                <p class="descricao">Selecione um evento para ver o resumo geral.</p>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/relatorio_geral.js"></script>
</body>
</html>

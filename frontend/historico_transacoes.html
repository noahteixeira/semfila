<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Histórico de Transações</title>
    <link rel="stylesheet" href="css/baladeiro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="baladeiro" data-pagina="historico-transacoes">

    <div id="saldo-navbar" class="saldo-navbar">
        <i class="fa-solid fa-wallet"></i>
        <strong>Saldo:</strong> R$ <span id="saldo-topo">0.00</span>
    </div>

    <main class="conteudo-principal">
        <div class="container">
            <h2>Histórico de Transações</h2>
            <p class="descricao">Veja aqui todas as suas transações de saldo (recargas e consumos).</p>
            <p class="descricao">As recargas aprovadas pela Stripe aparecem automaticamente nesta lista.</p>

            <div id="historico-lista">
                <!-- Histórico será carregado aqui -->
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/historico_transacoes.js"></script>
    <script src="js/saldo_navbar.js"></script>
</body>
</html>

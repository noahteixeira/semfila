<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Minha Pulseira</title>
    <link rel="stylesheet" href="css/area_baladeiro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="baladeiro" data-pagina="pulseira">

    <main class="conteudo-principal">
        <div class="container">
            <h1>Minha Pulseira</h1>
            <p>Gerencie sua pulseira RFID.</p>

            <div id="msg-erro" class="msg-erro" style="display: none;"></div>
            <div id="msg-sucesso" class="msg-sucesso" style="display: none;"></div>

            <!-- Sem pulseira: botao de assinar -->
            <div id="sem-pulseira" style="display: none;">
                <p>Você ainda não tem uma pulseira.</p>
                <p>Valor da assinatura: <strong>R$ 19,90/mês</strong></p>
                <button id="btn-assinar" class="btn">Assinar Pulseira</button>
            </div>

            <!-- Com pulseira: dados e acoes -->
            <div id="com-pulseira" style="display: none;">
                <table>
                    <tr>
                        <td><strong>Código RFID:</strong></td>
                        <td id="rfid"></td>
                    </tr>
                    <tr>
                        <td><strong>Saldo:</strong></td>
                        <td id="saldo"></td>
                    </tr>
                    <tr>
                        <td><strong>Status:</strong></td>
                        <td id="status"></td>
                    </tr>
                    <tr>
                        <td><strong>Assinatura até:</strong></td>
                        <td id="assinatura-fim"></td>
                    </tr>
                    <tr>
                        <td><strong>Criada em:</strong></td>
                        <td id="criado-em"></td>
                    </tr>
                </table>

                <!-- Adicionar saldo -->
                <div id="area-saldo" style="margin-top: 20px;">
                    <h3>Adicionar Saldo</h3>
                    <form id="form-saldo">
                        <label for="valor">Valor (R$):</label>
                        <input type="number" id="valor" name="valor" min="1" step="0.01" placeholder="Ex: 50.00" required>
                        <button type="submit" class="btn">Adicionar</button>
                    </form>
                </div>

                <!-- Renovar e cancelar -->
                <div style="margin-top: 20px;">
                    <button id="btn-renovar" class="btn">Renovar Assinatura (R$ 19,90)</button>
                    <button id="btn-cancelar" class="btn-desativar">Cancelar Pulseira</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/pulseira.js"></script>
</body>
</html>

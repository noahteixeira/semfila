<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Funcionários</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="container">
        <img src="assets/logo.png" alt="SemFila" class="logo">
        <h2>Funcionários da Balada</h2>

        <div id="msg-sucesso" class="msg-sucesso" style="display: none;">Funcionário desativado com sucesso.</div>

        <div id="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Status</th>
                        <th>Cadastrado em</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-funcionarios">
                </tbody>
            </table>
        </div>

        <p id="msg-vazio" style="display: none; color: #a0a0b0;">Nenhum funcionário cadastrado.</p>

        <div class="menu">
            <a href="cadastrar_funcionario.html" class="btn">Cadastrar Funcionário</a>
            <a href="area_gestor.html" class="btn">Voltar</a>
        </div>
    </div>

    <script src="js/listar_funcionarios.js"></script>
</body>
</html>

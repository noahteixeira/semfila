<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Controle de Fila</title>
    <link rel="stylesheet" href="css/funcionario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="funcionario" data-pagina="fila">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Controle de Fila</h2>
            <p class="descricao">Gerencie a fila de entrada do evento.</p>

            <div class="identificacao">
                <label for="nome">Nome da pessoa:</label>
                <input type="text" id="nome" placeholder="Nome da pessoa">
                <button onclick="adicionar()">Adicionar na fila</button>
            </div>

            <ul id="lista"></ul>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/controle_fila.js"></script>
</body>
</html>

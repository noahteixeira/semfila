<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Meus Eventos</title>
    <link rel="stylesheet" href="css/gestor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="gestor" data-pagina="eventos">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Meus Eventos</h2>

            <div id="msg-sucesso" class="msg-sucesso" style="display: none;"></div>
            <div id="msg-erro" class="msg-erro" style="display: none;"></div>

            <div id="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Data</th>
                            <th>Horário</th>
                            <th>Idade Min</th>
                            <th>Capacidade</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-eventos">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/listar_eventos.js"></script>
</body>
</html>

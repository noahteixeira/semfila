<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Recarregar Saldo</title>
    <link rel="stylesheet" href="css/area_baladeiro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="baladeiro" data-pagina="recarregar">

    <div id="saldo-navbar" class="saldo-navbar">
        <i class="fa-solid fa-wallet"></i>
        <strong>Saldo:</strong> R$ <span id="saldo-topo">0.00</span>
    </div>

    <main class="conteudo-principal">
        <div class="container">
            <h1>Recarregar Saldo</h1>
            <p>Adicione dinheiro ao seu saldo para gastar na balada.</p>

            <div id="msg-erro" class="msg-erro" style="display: none;"></div>
            <div id="msg-sucesso" class="msg-sucesso" style="display: none;"></div>

            <div id="area-recarregar">
                <p><strong>Seu Saldo Atual:</strong> R$ <span id="saldo-atual">0.00</span></p>
                <p style="margin-bottom: 10px; color: #a0a0b0;">Você será redirecionado para o checkout da Stripe.</p>
                <form id="form-recarregar">
                    <label for="valor">Valor a Adicionar (R$):</label>
                    <input type="number" id="valor" name="valor" min="1" step="0.01" placeholder="Ex: 50.00" required>
                    <button type="submit" class="btn">Pagar com Stripe</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/recarregar_saldo.js"></script>
    <script src="js/saldo_navbar.js"></script>
</body>
</html>

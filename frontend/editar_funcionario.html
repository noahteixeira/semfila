<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemFila - Editar Funcionário</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body data-cargo="gestor" data-pagina="funcionarios">

    <main class="conteudo-principal">
        <div class="container">
            <h2>Editar Funcionário</h2>

            <div id="msg-erro" class="msg-erro" style="display: none;"></div>
            <div id="msg-sucesso" class="msg-sucesso" style="display: none;">Funcionário atualizado com sucesso.</div>

            <form action="../backend/editar_funcionario.php" method="POST" id="form-editar">
                <input type="hidden" id="id" name="id">

                <label for="nome">Nome do Funcionário</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>

                <button type="submit">Salvar Alterações</button>
            </form>
        </div>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/editar_funcionario.js"></script>
</body>
</html>
